<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 200 200">
  <defs>
    <radialGradient id="bgGrad" cx="50%" cy="50%" r="50%">
      <stop offset="0%" style="stop-color:#1a1f4e"/>
      <stop offset="100%" style="stop-color:#0a0d2e"/>
    </radialGradient>
    <linearGradient id="boltGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#4facfe"/>
      <stop offset="50%" style="stop-color:#00f2fe"/>
      <stop offset="100%" style="stop-color:#a855f7"/>
    </linearGradient>
    <linearGradient id="ringGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#4facfe;stop-opacity:0.8"/>
      <stop offset="100%" style="stop-color:#a855f7;stop-opacity:0.3"/>
    </linearGradient>
    <filter id="glow">
      <feGaussianBlur stdDeviation="3" result="coloredBlur"/>
      <feMerge>
        <feMergeNode in="coloredBlur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
  </defs>

  <!-- Fond circulaire -->
  <circle cx="100" cy="100" r="95" fill="url(#bgGrad)"
    stroke="url(#ringGrad)" stroke-width="1.5"/>

  <!-- Anneau externe -->
  <circle cx="100" cy="100" r="85" fill="none"
    stroke="url(#ringGrad)" stroke-width="0.8" stroke-dasharray="4 3"
    opacity="0.6"/>

  <!-- Anneau orbital -->
  <ellipse cx="100" cy="100" rx="70" ry="25" fill="none"
    stroke="url(#ringGrad)" stroke-width="1" opacity="0.4"
    transform="rotate(-25, 100, 100)"/>

  <!-- Points orbitaux -->
  <circle cx="163" cy="86" r="3" fill="#4facfe" opacity="0.8"
    filter="url(#glow)"/>
  <circle cx="42" cy="118" r="2" fill="#a855f7" opacity="0.6"/>
  <circle cx="130" cy="48" r="1.5" fill="#00f2fe" opacity="0.5"/>

  <!-- Eclair PROMETHEUS -->
  <path d="M 108 45 L 88 98 L 103 98 L 92 155 L 118 92 L 102 92 Z"
    fill="url(#boltGrad)" filter="url(#glow)"/>

  <!-- Reflet sur l'eclair -->
  <path d="M 108 45 L 95 82 L 103 82 L 100 98 L 103 98 L 108 45 Z"
    fill="white" opacity="0.15"/>
</svg>
