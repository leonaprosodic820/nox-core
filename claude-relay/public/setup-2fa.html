<!DOCTYPE html><html lang="fr"><head><link rel="apple-touch-icon" href="icon-512.png"><link rel="apple-touch-icon" sizes="192x192" href="icon-192.png"><link rel="apple-touch-icon" sizes="512x512" href="icon-512.png"><link rel="icon" type="image/svg+xml" href="prometheus-logo.svg"><link rel="icon" type="image/png" sizes="512x512" href="icon-512.png"><meta charset="UTF-8"/><meta name="viewport" content="width=device-width,initial-scale=1"/><title>PROMETHEUS — 2FA Setup</title>
<style>*{box-sizing:border-box;margin:0;padding:0}body{background:#030308;color:#eef2ff;font-family:Inter,sans-serif;display:flex;align-items:center;justify-content:center;min-height:100vh;padding:20px}.card{background:rgba(8,10,28,0.95);border:1px solid rgba(79,172,254,0.2);border-radius:24px;padding:40px;max-width:480px;width:100%;text-align:center}h1{font-size:24px;font-weight:700;background:linear-gradient(90deg,#fff,#4facfe);-webkit-background-clip:text;-webkit-text-fill-color:transparent;margin-bottom:8px}p{color:rgba(238,242,255,0.6);font-size:14px;margin-bottom:24px}#qr{border-radius:16px;border:2px solid rgba(79,172,254,0.3);margin:20px auto;display:block}.secret{background:rgba(0,0,0,0.5);border:1px solid rgba(79,172,254,0.2);border-radius:12px;padding:12px;font-family:monospace;font-size:13px;color:#4facfe;word-break:break-all;margin:16px 0}input{width:100%;padding:14px;background:rgba(14,18,44,0.8);border:1px solid rgba(79,172,254,0.2);border-radius:12px;color:#eef2ff;font-size:18px;letter-spacing:8px;text-align:center;outline:none;margin:16px 0;font-family:monospace}input:focus{border-color:#4facfe}button{width:100%;padding:14px;border-radius:12px;border:none;cursor:pointer;background:linear-gradient(135deg,#4facfe,#00f2fe);color:#020408;font-weight:700;font-size:14px;margin-top:8px}#msg{display:none;border-radius:12px;padding:16px;margin:16px 0}.ok{background:rgba(16,185,129,0.1);border:1px solid rgba(16,185,129,0.3);color:#10b981;display:block}.err{background:rgba(239,68,68,0.1);border:1px solid rgba(239,68,68,0.3);color:#ef4444;display:block}</style></head><body>
<div class="card">
<div style="font-size:48px;margin-bottom:16px">🔐</div><h1>Setup 2FA TOTP</h1><p>Google Authenticator / Authy</p>
<div id="setup"><button onclick="start()">Générer QR Code</button></div>
<div id="scan" style="display:none">
<p>1. Scanner avec Google Authenticator<br>2. Entrer le code à 6 chiffres</p>
<img id="qr" width="200" height="200"/><p>Secret backup:</p><div class="secret" id="sec"></div>
<input id="code" maxlength="6" placeholder="000000" oninput="this.value=this.value.replace(/\D/g,'')" onkeypress="if(event.key==='Enter')confirm()"/>
<button onclick="confirm()">Confirmer & Activer</button></div>
<div id="msg"></div>
<div style="margin-top:24px;border-top:1px solid rgba(79,172,254,0.1);padding-top:16px"><a href="/" style="color:rgba(238,242,255,0.4);font-size:12px;text-decoration:none">← Dashboard</a></div>
</div>
<script>
let jwt='';
async function getJWT(){const pin=prompt('PIN:');if(!pin)return null;const r=await fetch('/remote/login',{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify({pin})});const d=await r.json();return d.token||null;}
async function start(){jwt=await getJWT();if(!jwt){msg('Auth requise','err');return;}const r=await fetch('/auth/2fa/setup',{method:'POST',headers:{'Authorization':'Bearer '+jwt,'Content-Type':'application/json'}});const d=await r.json();if(d.error){msg(d.error,'err');return;}document.getElementById('qr').src=d.qrDataURL;document.getElementById('sec').textContent=d.secret;document.getElementById('setup').style.display='none';document.getElementById('scan').style.display='block';}
async function confirm(){const t=document.getElementById('code').value.trim();if(t.length!==6){msg('6 chiffres requis','err');return;}const r=await fetch('/auth/2fa/confirm',{method:'POST',headers:{'Authorization':'Bearer '+jwt,'Content-Type':'application/json'},body:JSON.stringify({token:t})});const d=await r.json();if(d.success){msg('2FA activé !','ok');document.getElementById('scan').style.display='none';}else msg(d.error,'err');}
function msg(t,c){const e=document.getElementById('msg');e.className=c;e.textContent=t;e.style.display='block';}
</script></body></html>
