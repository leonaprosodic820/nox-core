<!DOCTYPE html><html lang="fr"><head><link rel="apple-touch-icon" href="icon-512.png"><link rel="apple-touch-icon" sizes="192x192" href="icon-192.png"><link rel="apple-touch-icon" sizes="512x512" href="icon-512.png"><link rel="icon" type="image/svg+xml" href="prometheus-logo.svg"><link rel="icon" type="image/png" sizes="512x512" href="icon-512.png"><meta charset="UTF-8"/><meta name="viewport" content="width=device-width,initial-scale=1"/><title>PROMETHEUS — Control Center</title>
<style>*{box-sizing:border-box;margin:0;padding:0}body{background:#030308;color:#eef2ff;font-family:Inter,sans-serif;min-height:100vh}.kb{position:fixed;top:0;left:0;right:0;z-index:9999;background:rgba(3,3,8,0.98);border-bottom:2px solid rgba(239,68,68,0.3);padding:8px 20px;display:flex;align-items:center;justify-content:space-between;height:50px}.kbtn{padding:8px 24px;border-radius:8px;border:2px solid #ef4444;background:rgba(239,68,68,0.15);color:#ef4444;font-weight:700;font-size:13px;cursor:pointer;transition:all 0.2s}.kbtn:hover{background:#ef4444;color:#fff;box-shadow:0 0 20px rgba(239,68,68,0.5)}.pill{padding:4px 12px;border-radius:20px;font-size:11px;font-weight:600;font-family:monospace}.pok{background:rgba(16,185,129,0.1);border:1px solid rgba(16,185,129,0.3);color:#10b981}.pdng{background:rgba(239,68,68,0.1);border:1px solid rgba(239,68,68,0.3);color:#ef4444}.ct{padding:70px 20px 20px;max-width:1200px;margin:0 auto}.g2{display:grid;grid-template-columns:1fr 1fr;gap:14px;margin-bottom:14px}.g3{display:grid;grid-template-columns:1fr 1fr 1fr;gap:14px;margin-bottom:14px}.cd{background:rgba(8,10,28,0.9);border:1px solid rgba(79,172,254,0.12);border-radius:16px;padding:18px}.ct2{font-size:12px;font-weight:600;color:rgba(238,242,255,0.5);margin-bottom:14px;text-transform:uppercase;letter-spacing:0.1em;display:flex;justify-content:space-between}.sv{font-size:28px;font-weight:700;background:linear-gradient(135deg,#4facfe,#00f2fe);-webkit-background-clip:text;-webkit-text-fill-color:transparent}.svr{background:linear-gradient(135deg,#ef4444,#dc2626);-webkit-background-clip:text;-webkit-text-fill-color:transparent}.bd{display:inline-block;padding:3px 8px;border-radius:12px;font-size:9px;font-family:monospace;margin:1px}.bs{background:rgba(16,185,129,0.1);border:1px solid rgba(16,185,129,0.3);color:#10b981}.bb{background:rgba(139,0,0,0.15);border:1px solid rgba(139,0,0,0.5);color:#ff4444}.bc{background:rgba(79,172,254,0.1);border:1px solid rgba(79,172,254,0.3);color:#4facfe}.bw{background:rgba(245,158,11,0.1);border:1px solid rgba(245,158,11,0.3);color:#f59e0b}.ll{max-height:250px;overflow-y:auto;font-family:monospace;font-size:10px}.li{padding:4px 0;border-bottom:1px solid rgba(79,172,254,0.05);display:flex;gap:6px;align-items:flex-start}.lt{color:rgba(238,242,255,0.25);white-space:nowrap;flex-shrink:0}.la{color:rgba(238,242,255,0.6);flex:1}.btn{padding:6px 14px;border-radius:8px;border:1px solid rgba(79,172,254,0.3);background:rgba(79,172,254,0.07);color:#4facfe;cursor:pointer;font-size:11px;transition:all 0.2s;margin:2px}.btn:hover{background:rgba(79,172,254,0.15)}.bd2{border-color:rgba(239,68,68,0.3);color:#ef4444;background:rgba(239,68,68,0.07)}@media(max-width:700px){.g2,.g3{grid-template-columns:1fr}}</style></head><body>
<div class="kb"><div style="display:flex;align-items:center;gap:10px"><span style="font-size:16px">⚡</span><span style="font-weight:700;font-size:14px">Control Center</span><span id="gs" class="pill pok">● EN LIGNE</span></div><div style="display:flex;gap:10px;align-items:center"><span id="ib" class="pill pok">🛡 OK</span><button class="kbtn" onclick="doKill()">🔴 KILL SWITCH</button></div></div>
<div class="ct">
<div class="g3"><div class="cd"><div class="ct2">Actions</div><div class="sv" id="ac">—</div><div style="font-size:10px;color:rgba(238,242,255,0.3)">total</div></div><div class="cd"><div class="ct2">Bloquées</div><div class="sv svr" id="bc2">—</div><div style="font-size:10px;color:rgba(238,242,255,0.3)">par les règles</div></div><div class="cd"><div class="ct2">Uptime</div><div class="sv" id="up">—</div><div style="font-size:10px;color:rgba(238,242,255,0.3)">secondes</div></div></div>
<div class="g2"><div class="cd"><div class="ct2">💻 Ressources <button class="btn" onclick="load()">↻</button></div><div id="rc">...</div></div><div class="cd"><div class="ct2">🛡 Intégrité</div><div id="ic">...</div></div></div>
<div class="g2"><div class="cd"><div class="ct2">⚡ Simuler commande</div><input id="sc" placeholder="ls ~/Documents" style="width:100%;padding:10px;background:rgba(0,0,0,0.5);border:1px solid rgba(79,172,254,0.2);border-radius:8px;color:#eef2ff;font-family:monospace;font-size:12px;outline:none;margin-bottom:8px"/><button class="btn" onclick="sim()" style="width:100%">🔍 Analyser</button><div id="sr" style="margin-top:8px;font-size:11px"></div></div><div class="cd"><div class="ct2">🔐 Permissions <button class="btn bd2" onclick="revokeAll()">Tout révoquer</button></div><div id="cl">Aucune</div></div></div>
<div class="cd" style="margin-bottom:14px"><div class="ct2">📋 Audit Log <div><button class="btn" onclick="flog('BLOCKED')">Bloqués</button><button class="btn" onclick="flog('CRITICAL')">Critiques</button><button class="btn" onclick="flog(null)">Tous</button></div></div><div class="ll" id="al"></div></div>
<div class="cd"><div class="ct2">⚡ Navigation</div><div style="display:flex;flex-wrap:wrap;gap:6px"><a href="/" class="btn">Dashboard</a><a href="/analytics" class="btn">Analytics</a><a href="/setup-2fa.html" class="btn">2FA</a><button class="btn" onclick="load()">↻ Refresh</button></div></div>
</div>
<script>
const T=localStorage.getItem('relay_token')||'';
async function af(u,o={}){return fetch(u,{...o,headers:{'Content-Type':'application/json','Authorization':'Bearer '+T,...(o.headers||{})}});}
async function load(){try{const r=await af('/sovereignty/status');const d=await r.json();const s=d.sovereignty||{};const k=s.killSwitchActive;document.getElementById('gs').className='pill '+(k?'pdng':'pok');document.getElementById('gs').textContent=k?'● ARRÊTÉ':'● EN LIGNE';document.getElementById('ac').textContent=(s.actionCount||0).toLocaleString();document.getElementById('bc2').textContent=(s.blockedCount||0).toLocaleString();document.getElementById('up').textContent=(s.uptime||0).toLocaleString();const rs=d.resources||{};document.getElementById('rc').innerHTML=`🧠 RAM: <b>${rs.ramMB||'?'}MB</b>/800 · ⚙️ Children: <b>${rs.childCount||0}</b>/8 · ${rs.withinLimits?'✅ OK':'⚠️ '+((rs.warnings||[]).join(', '))}`;const ig=d.integrity||{};document.getElementById('ic').innerHTML=ig.ok?'<span style="color:#10b981">✅ Fichiers intacts</span>':'<span style="color:#ef4444">❌ MODIFIÉS: '+(ig.changes||[]).map(c=>c.file).join(', ')+'</span>';document.getElementById('ib').className='pill '+(ig.ok?'pok':'pdng');document.getElementById('ib').textContent=ig.ok?'🛡 OK':'⚠️ !';const cn=d.consents?.active||[];document.getElementById('cl').innerHTML=cn.length?cn.map(c=>`<div style="font-size:11px;padding:3px 0">${c.permission} (${c.expiresIn})</div>`).join(''):'<span style="font-size:11px;color:rgba(238,242,255,0.3)">Aucune</span>';}catch(e){}}
async function flog(f){try{const u='/sovereignty/audit?n=50'+(f?'&filter='+f:'');const r=await af(u);const d=await r.json();document.getElementById('al').innerHTML=(d||[]).map(e=>`<div class="li"><span class="lt">${(e.ts||'').slice(11,19)}</span><span class="bd ${e.level==='CRITICAL'||e.blocked?'bb':e.classification==='BLOCKED'?'bb':e.level==='WARN'?'bw':'bc'}">${e.level}</span><span class="la">${e.action||''} ${e.detail?'· '+e.detail.slice(0,50):''}</span></div>`).join('')||'Vide';}catch(e){}}
async function doKill(){if(!confirm('⚠️ KILL SWITCH — Arrêter PROMETHEUS ?'))return;if(!confirm('CONFIRMER ?'))return;try{await af('/sovereignty/kill',{method:'POST',body:JSON.stringify({})});alert('🔴 PROMETHEUS arrêté');load();}catch(e){}}
async function revokeAll(){if(!confirm('Révoquer toutes les permissions ?'))return;await af('/sovereignty/consent/revoke',{method:'POST',body:JSON.stringify({})});load();}
async function sim(){const c=document.getElementById('sc').value.trim();if(!c)return;try{const r=await af('/sovereignty/simulate',{method:'POST',body:JSON.stringify({command:c})});const d=await r.json();document.getElementById('sr').innerHTML=`<span class="bd ${d.allowed?'bs':'bb'}">${d.allowed?'✅ AUTORISÉ':'🚫 BLOQUÉ'} — ${d.classification||'?'}</span><div style="margin-top:4px;color:rgba(238,242,255,0.5)">${d.reason||''}</div>`;}catch(e){}}
load();flog(null);setInterval(load,10000);setInterval(()=>flog(null),10000);
</script></body></html>
