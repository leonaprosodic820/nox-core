<!DOCTYPE html><html lang="fr"><head><meta charset="UTF-8"><meta name="viewport" content="width=device-width,initial-scale=1"><title>PROMETHEUS Monitor</title>
<style>:root{--bg:#070b14;--s:#0d1424;--b:rgba(79,172,254,.12);--a:#4facfe;--g:#22c55e;--r:#ef4444;--y:#f59e0b;--t:#eef2ff;--m:rgba(238,242,255,.4);--f:'JetBrains Mono',monospace}*{margin:0;padding:0;box-sizing:border-box}body{background:var(--bg);color:var(--t);font-family:var(--f);font-size:13px}.hdr{padding:14px 20px;border-bottom:1px solid var(--b);display:flex;align-items:center;justify-content:space-between;background:var(--s);position:sticky;top:0;z-index:10}.hdr h1{font-size:15px;font-weight:700;background:linear-gradient(135deg,#fff,var(--a));-webkit-background-clip:text;-webkit-text-fill-color:transparent}.live{display:flex;align-items:center;gap:6px;padding:4px 10px;background:rgba(34,197,94,.1);border:1px solid rgba(34,197,94,.3);border-radius:20px;font-size:11px;color:var(--g)}.ld{width:6px;height:6px;border-radius:50%;background:var(--g);animation:p 1.5s infinite}@keyframes p{0%,100%{opacity:1}50%{opacity:.3}}.grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(200px,1fr));gap:12px;padding:16px}.gw{grid-template-columns:repeat(auto-fill,minmax(300px,1fr))}.c{background:var(--s);border:1px solid var(--b);border-radius:12px;padding:14px}.ct{font-size:10px;color:var(--m);text-transform:uppercase;letter-spacing:.1em;margin-bottom:10px}.gw2{position:relative;width:100px;height:100px;margin:0 auto 8px}.gs{width:100%;height:100%;transform:rotate(-90deg)}.gbg{fill:none;stroke:rgba(255,255,255,.05);stroke-width:8}.gf{fill:none;stroke-width:8;stroke-linecap:round;transition:stroke-dashoffset .8s ease}.gt{position:absolute;top:50%;left:50%;transform:translate(-50%,-50%);text-align:center}.gv{font-size:20px;font-weight:700}.gu{font-size:10px;color:var(--m)}.sr{display:flex;align-items:center;justify-content:space-between;padding:6px 0;border-bottom:1px solid rgba(255,255,255,.04)}.sr:last-child{border:none}.sn{font-size:12px}.ds{width:8px;height:8px;border-radius:50%;display:inline-block}.on{background:var(--g);box-shadow:0 0 6px var(--g)}.off{background:var(--r)}.pb{display:flex;align-items:center;gap:8px;padding:4px 0}.pn{width:120px;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;color:var(--m);font-size:11px}.pbg{flex:1;background:rgba(255,255,255,.05);border-radius:3px;height:4px;overflow:hidden}.pf{height:100%;border-radius:3px;background:linear-gradient(90deg,var(--a),#a78bfa)}.pv{width:40px;text-align:right;font-size:11px;color:var(--a)}.fl{grid-column:1/-1}</style></head><body>
<div class="hdr"><h1>📊 Monitor</h1><div style="display:flex;align-items:center;gap:12px"><span style="font-size:10px;color:var(--m)" id="ts">--</span><div class="live"><div class="ld"></div>LIVE 3s</div><a href="/" style="color:var(--m);text-decoration:none;font-size:12px">← Chat</a></div></div>
<div class="grid" id="g"></div><div class="grid gw" id="d" style="padding-top:0"></div>
<script>
const R=40,C=2*Math.PI*R;
function g(v,mx,cl){const p=Math.min(100,Math.max(0,v/mx*100)),o=C-p/100*C;return'<div class="gw2"><svg class="gs" viewBox="0 0 100 100"><circle class="gbg" cx="50" cy="50" r="'+R+'"/><circle class="gf" cx="50" cy="50" r="'+R+'" stroke="'+cl+'" stroke-dasharray="'+C+'" stroke-dashoffset="'+o+'"/></svg><div class="gt"><div class="gv" style="color:'+cl+'">'+Math.round(v)+'</div><div class="gu">%</div></div></div>';}
function cf(v){return v>85?'var(--r)':v>70?'var(--y)':'var(--g)';}
function render(d){document.getElementById('ts').textContent=new Date(d.ts).toLocaleTimeString('fr-FR');
document.getElementById('g').innerHTML='<div class="c" style="text-align:center"><div class="ct">CPU</div>'+g(d.cpu,100,cf(d.cpu))+'</div><div class="c" style="text-align:center"><div class="ct">RAM</div>'+g(d.ram,100,cf(d.ram))+'</div><div class="c" style="text-align:center"><div class="ct">Disque</div>'+g(d.disk,100,cf(d.disk))+'</div>'+(d.battery!=null?'<div class="c" style="text-align:center"><div class="ct">Batterie</div>'+g(d.battery,100,d.battery>20?'var(--g)':'var(--r)')+'</div>':'');
const sv=d.services||[],pr=d.topProcesses||[];
document.getElementById('d').innerHTML='<div class="c"><div class="ct">Services PM2</div>'+sv.map(s=>'<div class="sr"><span class="sn">'+s.name+'</span><span style="font-size:11px;color:var(--m)">'+s.cpu+'% · '+s.memory+'MB <span class="ds '+(s.status==='online'?'on':'off')+'"></span></span></div>').join('')+'</div>'+(pr.length?'<div class="c"><div class="ct">Top CPU</div>'+pr.map(p=>'<div class="pb"><div class="pn">'+p.name+'</div><div class="pbg"><div class="pf" style="width:'+Math.min(100,p.cpu)+'%"></div></div><div class="pv">'+p.cpu+'%</div></div>').join('')+'</div>':'')+'<div class="c"><div class="ct">Système</div><div class="sr"><span>Uptime</span><span style="color:var(--a);font-weight:600">'+(d.uptime||'?')+'</span></div></div>';}
const es=new EventSource('/monitor/stream');
es.onmessage=e=>{try{const d=JSON.parse(e.data);if(d.ts)render(d);}catch(e){}};
es.onerror=()=>{es.close();const iv=setInterval(async()=>{try{const r=await fetch('/monitor/realtime');render(await r.json());}catch(e){}},5000);};
</script></body></html>
