<!DOCTYPE html>
<html lang="fr">
<head><link rel="apple-touch-icon" href="icon-512.png"><link rel="icon" type="image/svg+xml" href="prometheus-logo.svg">
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="theme-color" content="#1c1c1e">
<title>Vision - Claude Relay</title>
<style>
:root {
  --bg:#1c1c1e; --surface:#2c2c2e; --accent:#0a84ff; --green:#30d158;
  --red:#ff453a; --yellow:#ffd60a; --text:#fff; --text2:rgba(235,235,245,0.8);
  --toolbar-h:52px; --bottombar-h:100px; --glass:rgba(44,44,46,0.72);
}
*{margin:0;padding:0;box-sizing:border-box}
html,body{height:100%;overflow:hidden;background:var(--bg);color:var(--text);
  font-family:-apple-system,BlinkMacSystemFont,'SF Pro Display',sans-serif}

/* LOGIN */
#login-screen{display:flex;align-items:center;justify-content:center;height:100%;
  background:var(--bg);position:fixed;inset:0;z-index:9999}
#login-screen.hidden{display:none}
.login-box{text-align:center;width:300px}
.login-logo{font-size:48px;margin-bottom:12px}
.login-title{font-size:22px;font-weight:600;margin-bottom:24px;color:var(--text)}
.login-title span{color:var(--text2);font-weight:400;font-size:14px;display:block;margin-top:4px}
.pin-wrap{display:flex;gap:10px;justify-content:center;margin-bottom:20px}
.pin-dot{width:14px;height:14px;border-radius:50%;border:2px solid var(--text2);transition:.15s}
.pin-dot.filled{background:var(--accent);border-color:var(--accent)}
.numpad{display:grid;grid-template-columns:repeat(3,1fr);gap:10px;max-width:240px;margin:0 auto}
.numpad button{height:52px;border-radius:26px;border:none;background:var(--surface);color:var(--text);
  font-size:22px;font-weight:500;cursor:pointer;transition:.15s;-webkit-tap-highlight-color:transparent}
.numpad button:active{background:var(--accent);transform:scale(.95)}
.numpad button:disabled{opacity:0;pointer-events:none}
.login-error{color:var(--red);font-size:13px;margin-top:12px;min-height:18px}

/* TOOLBAR */
.toolbar{position:fixed;top:0;left:0;right:0;height:var(--toolbar-h);
  background:var(--glass);backdrop-filter:blur(20px);-webkit-backdrop-filter:blur(20px);
  display:flex;align-items:center;padding:0 16px;z-index:100;border-bottom:1px solid rgba(255,255,255,0.08)}
.toolbar-left,.toolbar-center,.toolbar-right{display:flex;align-items:center;gap:10px}
.toolbar-left{flex:0 0 auto}
.toolbar-center{flex:1;justify-content:center;gap:8px;flex-wrap:nowrap}
.toolbar-right{flex:0 0 auto;gap:8px}
.tlogo{font-size:20px}
.quality-sel{background:var(--surface);border:1px solid rgba(255,255,255,0.1);border-radius:8px;
  color:var(--text);padding:4px 8px;font-size:12px;cursor:pointer;outline:none}
.quality-sel option{background:var(--surface)}
.tbtn{background:var(--surface);border:1px solid rgba(255,255,255,0.1);border-radius:8px;
  color:var(--text);padding:6px 12px;font-size:12px;cursor:pointer;transition:.15s;white-space:nowrap}
.tbtn:hover{background:rgba(255,255,255,0.12)}
.tbtn:active{transform:scale(.95)}
.tbtn.active{background:var(--red);border-color:var(--red)}
.fps-wrap{display:flex;align-items:center;gap:4px}
.fps-wrap input[type=range]{width:70px;accent-color:var(--accent)}
.fps-label{font-size:11px;color:var(--text2);min-width:32px}
.rec-timer{font-size:12px;font-variant-numeric:tabular-nums;color:var(--red);min-width:48px;text-align:right}
.rec-timer.blink{animation:blink-red 1s infinite}
@keyframes blink-red{0%,100%{opacity:1}50%{opacity:.3}}
.latency-badge{font-size:11px;padding:3px 8px;border-radius:6px;background:rgba(48,209,88,0.15);color:var(--green)}
.latency-badge.warn{background:rgba(255,214,10,0.15);color:var(--yellow)}
.latency-badge.bad{background:rgba(255,69,58,0.15);color:var(--red)}
.fullscreen-btn{background:none;border:none;color:var(--text);font-size:18px;cursor:pointer;padding:4px}

/* VIEWPORT */
.viewport{position:fixed;top:var(--toolbar-h);left:0;right:0;bottom:var(--bottombar-h);
  display:flex;align-items:center;justify-content:center;background:#000;overflow:hidden}
#screenImg{max-width:100%;max-height:100%;object-fit:contain;cursor:crosshair;user-select:none;
  -webkit-user-drag:none;display:block}
.flash{position:absolute;inset:0;background:#fff;opacity:0;pointer-events:none;z-index:10}
.flash.active{animation:flash-anim .3s ease-out}
@keyframes flash-anim{0%{opacity:.7}100%{opacity:0}}
.ripple{position:fixed;width:30px;height:30px;border-radius:50%;border:2px solid var(--accent);
  pointer-events:none;z-index:200;transform:translate(-50%,-50%) scale(0);opacity:1}
.ripple.active{animation:ripple-anim .5s ease-out forwards}
@keyframes ripple-anim{0%{transform:translate(-50%,-50%) scale(0);opacity:1}
  100%{transform:translate(-50%,-50%) scale(3);opacity:0}}

/* HUD */
.hud{position:fixed;bottom:calc(var(--bottombar-h) + 8px);left:12px;
  background:rgba(0,0,0,0.55);backdrop-filter:blur(8px);border-radius:8px;
  padding:6px 10px;font-size:11px;color:var(--text2);z-index:50;
  display:flex;gap:12px;font-variant-numeric:tabular-nums}
.hud span{display:flex;align-items:center;gap:3px}

/* REC BADGE */
.rec-badge{position:fixed;top:calc(var(--toolbar-h) + 10px);right:14px;
  background:var(--red);color:#fff;font-size:11px;font-weight:600;
  padding:4px 10px;border-radius:6px;z-index:150;display:none;align-items:center;gap:5px}
.rec-badge.show{display:flex;animation:pulse-rec 1.2s infinite}
.rec-dot{width:8px;height:8px;border-radius:50%;background:#fff}
@keyframes pulse-rec{0%,100%{opacity:1}50%{opacity:.5}}

/* BOTTOM BAR */
.bottombar{position:fixed;bottom:0;left:0;right:0;height:var(--bottombar-h);
  background:var(--glass);backdrop-filter:blur(20px);-webkit-backdrop-filter:blur(20px);
  border-top:1px solid rgba(255,255,255,0.08);display:flex;align-items:center;
  padding:0 12px;z-index:100;overflow:hidden}
.gallery-scroll{display:flex;gap:8px;overflow-x:auto;overflow-y:hidden;flex:1;
  scrollbar-width:none;padding:8px 0}
.gallery-scroll::-webkit-scrollbar{display:none}
.gallery-thumb{width:72px;height:72px;border-radius:8px;object-fit:cover;cursor:pointer;
  border:2px solid transparent;transition:.15s;flex-shrink:0;background:var(--surface)}
.gallery-thumb:hover{border-color:var(--accent);transform:scale(1.05)}
.gallery-thumb.video{position:relative}
.gallery-empty{color:var(--text2);font-size:12px;margin:auto;text-align:center}

/* MODAL */
.modal-overlay{position:fixed;inset:0;background:rgba(0,0,0,0.85);z-index:500;
  display:none;align-items:center;justify-content:center;flex-direction:column}
.modal-overlay.show{display:flex}
.modal-img{max-width:90vw;max-height:80vh;object-fit:contain;border-radius:8px}
.modal-actions{margin-top:16px;display:flex;gap:12px}
.modal-btn{background:var(--surface);border:1px solid rgba(255,255,255,0.15);border-radius:8px;
  color:var(--text);padding:8px 20px;font-size:14px;cursor:pointer;transition:.15s}
.modal-btn:hover{background:var(--accent)}
.modal-btn.close{background:rgba(255,69,58,0.2);color:var(--red)}
</style>
</head>
<body>

<!-- LOGIN -->
<div id="login-screen">
  <div class="login-box">
    <div class="login-logo">⚡</div>
    <h1 class="login-title">Vision<span>Claude Relay</span></h1>
    <div class="pin-wrap" id="pinDots"></div>
    <div class="numpad">
      <button onclick="pinInput('1')">1</button><button onclick="pinInput('2')">2</button><button onclick="pinInput('3')">3</button>
      <button onclick="pinInput('4')">4</button><button onclick="pinInput('5')">5</button><button onclick="pinInput('6')">6</button>
      <button onclick="pinInput('7')">7</button><button onclick="pinInput('8')">8</button><button onclick="pinInput('9')">9</button>
      <button disabled></button><button onclick="pinInput('0')">0</button><button onclick="pinDelete()">&#x232B;</button>
    </div>
    <div class="login-error" id="loginError"></div>
  </div>
</div>

<!-- APP -->
<div id="app-screen" style="display:none">

  <!-- TOOLBAR -->
  <div class="toolbar">
    <div class="toolbar-left">
      <span class="tlogo">⚡</span>
      <select class="quality-sel" id="qualitySel" onchange="changeQuality(this.value)">
        <option value="low">Low</option>
        <option value="medium" selected>Medium</option>
        <option value="high">High</option>
        <option value="native">Native</option>
      </select>
    </div>
    <div class="toolbar-center">
      <button class="tbtn" onclick="takeScreenshot()">&#x1F4F8; Screenshot</button>
      <button class="tbtn" id="recBtn" onclick="toggleRecord()">&#x23FA; Record</button>
      <button class="tbtn" onclick="captureGif()">&#x1F39E; GIF</button>
      <div class="fps-wrap">
        <input type="range" min="1" max="30" value="10" id="fpsSlider" oninput="changeFps(this.value)">
        <span class="fps-label" id="fpsLabel">10fps</span>
      </div>
    </div>
    <div class="toolbar-right">
      <span class="rec-timer" id="recTimer"></span>
      <span class="latency-badge" id="latencyBadge">--ms</span>
      <button class="fullscreen-btn" onclick="toggleFullscreen()" title="Fullscreen">&#x26F6;</button>
    </div>
  </div>

  <!-- VIEWPORT -->
  <div class="viewport" id="viewport">
    <img id="screenImg" alt="Screen" draggable="false">
    <div class="flash" id="flash"></div>
  </div>

  <!-- HUD -->
  <div class="hud" id="hud">
    <span id="hudRes">-- x --</span>
    <span id="hudFps">0 fps</span>
    <span id="hudSize">0 KB</span>
    <span id="hudLatency">0 ms</span>
  </div>

  <!-- REC BADGE -->
  <div class="rec-badge" id="recBadge"><div class="rec-dot"></div><span>REC</span></div>

  <!-- BOTTOM BAR -->
  <div class="bottombar">
    <div class="gallery-scroll" id="gallery">
      <div class="gallery-empty" id="galleryEmpty">Captures will appear here</div>
    </div>
  </div>

  <!-- MODAL -->
  <div class="modal-overlay" id="modal" onclick="closeModal(event)">
    <img class="modal-img" id="modalImg">
    <div class="modal-actions">
      <button class="modal-btn" onclick="downloadModal()">&#x2B07; Download</button>
      <button class="modal-btn close" onclick="closeModal()">Close</button>
    </div>
  </div>
</div>

<script>
/* ── Auth ──────────────────────────────────────────────── */
let token = document.cookie.match(/relay_token=([^;]+)/)?.[1] || localStorage.getItem('relay_token') || '';
let pin = '';
const PIN_LEN = 6;

function renderDots(){
  const c = document.getElementById('pinDots');
  c.innerHTML = '';
  for(let i=0;i<PIN_LEN;i++){
    const d = document.createElement('div');
    d.className = 'pin-dot' + (i < pin.length ? ' filled' : '');
    c.appendChild(d);
  }
}
renderDots();

function pinInput(n){
  if(pin.length >= PIN_LEN) return;
  pin += n;
  renderDots();
  if(pin.length === PIN_LEN) submitPin();
}
function pinDelete(){
  pin = pin.slice(0,-1);
  renderDots();
}

async function submitPin(){
  try{
    const res = await fetch('/remote/login', {
      method:'POST', headers:{'Content-Type':'application/json'},
      body: JSON.stringify({pin})
    });
    const data = await res.json();
    if(data.token){
      token = data.token;
      localStorage.setItem('relay_token', token);
      document.cookie = `relay_token=${token};path=/;max-age=86400;SameSite=Strict`;
      showApp();
    } else {
      document.getElementById('loginError').textContent = data.error || 'Invalid PIN';
      pin = ''; renderDots();
    }
  }catch(e){
    document.getElementById('loginError').textContent = 'Connection error';
    pin = ''; renderDots();
  }
}

function showApp(){
  document.getElementById('login-screen').classList.add('hidden');
  document.getElementById('app-screen').style.display = '';
  startStream();
  setupClickControl();
}

/* ── State ─────────────────────────────────────────────── */
let state = {
  quality:'medium', fps:10, recording:false, recSessionId:null, recStart:null,
  gallery:[], polling:null, frameCount:0, fpsActual:0, lastFpsCheck:Date.now()
};
let modalUrl = '';

if(token) showApp();

/* ── API ───────────────────────────────────────────────── */
async function api(method, path, body){
  const opts = { method, headers:{'Authorization':`Bearer ${token}`,'Content-Type':'application/json'} };
  if(body) opts.body = JSON.stringify(body);
  return fetch(path, opts);
}

/* ── Stream / Polling ──────────────────────────────────── */
function startStream(){
  const img = document.getElementById('screenImg');
  img.src = `/remote/vision/mjpeg?quality=${state.quality}&_=${Date.now()}`;
  img.onerror = () => { img.onerror = null; startPolling(); };
  img.onload = () => countFrame();
}

function startPolling(){
  stopPolling();
  state.polling = setInterval(async ()=>{
    try{
      const t0 = Date.now();
      const res = await api('GET', `/remote/vision/screenshot?quality=${state.quality}&format=jpeg`);
      if(!res.ok) return;
      const blob = await res.blob();
      const url = URL.createObjectURL(blob);
      const img = document.getElementById('screenImg');
      const old = img.src;
      img.src = url;
      if(old.startsWith('blob:')) URL.revokeObjectURL(old);
      const lat = Date.now() - t0;
      updateHUD({latency:lat, size:blob.size});
      countFrame();
    }catch(e){}
  }, Math.floor(1000/state.fps));
}

function stopPolling(){
  if(state.polling){ clearInterval(state.polling); state.polling = null; }
}

function countFrame(){
  state.frameCount++;
  const now = Date.now();
  if(now - state.lastFpsCheck >= 1000){
    state.fpsActual = Math.round(state.frameCount * 1000 / (now - state.lastFpsCheck));
    state.frameCount = 0;
    state.lastFpsCheck = now;
    document.getElementById('hudFps').textContent = state.fpsActual + ' fps';
  }
}

function updateHUD(d){
  if(d.latency !== undefined){
    document.getElementById('hudLatency').textContent = d.latency + ' ms';
    const badge = document.getElementById('latencyBadge');
    badge.textContent = d.latency + 'ms';
    badge.className = 'latency-badge' + (d.latency > 500 ? ' bad' : d.latency > 200 ? ' warn' : '');
  }
  if(d.size !== undefined){
    document.getElementById('hudSize').textContent = (d.size/1024).toFixed(1) + ' KB';
  }
}

/* ── Quality / FPS ─────────────────────────────────────── */
function changeQuality(q){
  state.quality = q;
  if(state.polling) startPolling();
  else startStream();
}

function changeFps(v){
  state.fps = parseInt(v);
  document.getElementById('fpsLabel').textContent = v + 'fps';
  if(state.polling) startPolling();
}

/* ── Screenshot ────────────────────────────────────────── */
async function takeScreenshot(){
  flashViewport();
  try{
    const res = await api('GET', `/remote/vision/screenshot?quality=high&format=jpeg`);
    if(!res.ok) return;
    const blob = await res.blob();
    addToGallery({type:'image', url:URL.createObjectURL(blob), size:blob.size, ts:Date.now()});
  }catch(e){}
}

function flashViewport(){
  const f = document.getElementById('flash');
  f.classList.remove('active');
  void f.offsetWidth;
  f.classList.add('active');
  setTimeout(()=> f.classList.remove('active'), 350);
}

/* ── Record ────────────────────────────────────────────── */
async function toggleRecord(){
  const btn = document.getElementById('recBtn');
  if(!state.recording){
    try{
      const res = await api('POST', '/remote/vision/record/start', {quality:state.quality, fps:state.fps, maxDuration:300});
      const data = await res.json();
      state.recSessionId = data.sessionId;
      state.recStart = Date.now();
      state.recording = true;
      btn.classList.add('active');
      btn.innerHTML = '&#x23F9; Stop';
      showRecBadge();
    }catch(e){}
  } else {
    try{
      const res = await api('POST', '/remote/vision/record/stop', {sessionId:state.recSessionId});
      const data = await res.json();
      state.recording = false;
      btn.classList.remove('active');
      btn.innerHTML = '&#x23FA; Record';
      hideRecBadge();
      addToGallery({type:'video', filename:data.filename, size:data.size, duration:data.duration, ts:Date.now()});
    }catch(e){}
  }
}

function showRecBadge(){
  document.getElementById('recBadge').classList.add('show');
  updateRecTimer();
}
function hideRecBadge(){
  document.getElementById('recBadge').classList.remove('show');
  document.getElementById('recTimer').textContent = '';
  document.getElementById('recTimer').classList.remove('blink');
}

function updateRecTimer(){
  if(!state.recording) return;
  const elapsed = Math.floor((Date.now() - state.recStart) / 1000);
  const m = String(Math.floor(elapsed/60)).padStart(2,'0');
  const s = String(elapsed%60).padStart(2,'0');
  const el = document.getElementById('recTimer');
  el.textContent = m + ':' + s;
  el.classList.add('blink');
  requestAnimationFrame(()=> setTimeout(updateRecTimer, 500));
}

/* ── GIF ───────────────────────────────────────────────── */
async function captureGif(){
  try{ await api('POST', '/remote/vision/gif', {duration:5, fps:10, scale:640}); }catch(e){}
}

/* ── Click Control ─────────────────────────────────────── */
function setupClickControl(){
  document.getElementById('screenImg').addEventListener('click', async(e)=>{
    const img = e.target;
    const rect = img.getBoundingClientRect();
    const xRel = (e.clientX - rect.left) / rect.width;
    const yRel = (e.clientY - rect.top) / rect.height;
    const x = Math.round(xRel * 2560);
    const y = Math.round(yRel * 1600);
    showRipple(e.clientX, e.clientY);
    try{ await api('POST', '/remote/mouse/click', {x, y}); }catch(e){}
  });
}

function showRipple(cx, cy){
  const r = document.createElement('div');
  r.className = 'ripple';
  r.style.left = cx + 'px';
  r.style.top = cy + 'px';
  document.body.appendChild(r);
  void r.offsetWidth;
  r.classList.add('active');
  setTimeout(()=> r.remove(), 550);
}

/* ── Gallery ───────────────────────────────────────────── */
function addToGallery(item){
  state.gallery.unshift(item);
  if(state.gallery.length > 20) state.gallery.pop();
  renderGallery();
}

function renderGallery(){
  const g = document.getElementById('gallery');
  const empty = document.getElementById('galleryEmpty');
  if(state.gallery.length === 0){ empty.style.display = ''; return; }
  empty.style.display = 'none';
  // Remove old thumbs
  g.querySelectorAll('.gallery-thumb').forEach(t=> t.remove());
  state.gallery.forEach((item, i)=>{
    const img = document.createElement('img');
    img.className = 'gallery-thumb' + (item.type === 'video' ? ' video' : '');
    img.src = item.url || '';
    img.alt = item.type;
    img.onclick = ()=> openModal(item);
    g.prepend(img);
  });
}

/* ── Modal ─────────────────────────────────────────────── */
function openModal(item){
  if(item.type !== 'image') return;
  modalUrl = item.url;
  document.getElementById('modalImg').src = item.url;
  document.getElementById('modal').classList.add('show');
}

function closeModal(e){
  if(e && e.target !== e.currentTarget && !e.target.classList.contains('close')) return;
  document.getElementById('modal').classList.remove('show');
}

function downloadModal(){
  if(!modalUrl) return;
  const a = document.createElement('a');
  a.href = modalUrl;
  a.download = 'capture-' + Date.now() + '.jpg';
  a.click();
}

/* ── Fullscreen ────────────────────────────────────────── */
function toggleFullscreen(){
  if(!document.fullscreenElement) document.documentElement.requestFullscreen().catch(()=>{});
  else document.exitFullscreen();
}

/* ── Keyboard ──────────────────────────────────────────── */
document.addEventListener('keydown', (e)=>{
  if(e.key === 'Escape') closeModal();
  if(e.key === 'f' && !e.ctrlKey && !e.metaKey) toggleFullscreen();
});

/* ── Image natural size for HUD ────────────────────────── */
const sImg = document.getElementById('screenImg');
if(sImg){
  const obs = new MutationObserver(()=>{
    if(sImg.naturalWidth){
      document.getElementById('hudRes').textContent = sImg.naturalWidth + ' x ' + sImg.naturalHeight;
    }
  });
  sImg.addEventListener('load', ()=>{
    document.getElementById('hudRes').textContent = sImg.naturalWidth + ' x ' + sImg.naturalHeight;
  });
}
</script>
</body>
</html>
