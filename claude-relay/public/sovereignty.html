<!DOCTYPE html><html lang="fr"><head><meta charset="UTF-8"><meta name="viewport" content="width=device-width,initial-scale=1"><title>PROMETHEUS Sovereignty</title>
<style>:root{--bg:#070b14;--s:#0d1424;--b:rgba(79,172,254,.12);--a:#4facfe;--g:#22c55e;--r:#ef4444;--y:#f59e0b;--t:#eef2ff;--m:rgba(238,242,255,.4);--f:'JetBrains Mono',monospace}*{margin:0;padding:0;box-sizing:border-box}body{background:var(--bg);color:var(--t);font-family:var(--f);font-size:13px}.hdr{padding:14px 20px;border-bottom:1px solid var(--b);display:flex;align-items:center;justify-content:space-between;background:var(--s);position:sticky;top:0;z-index:10}.hdr h1{font-size:15px;font-weight:700;background:linear-gradient(135deg,#fff,var(--r));-webkit-background-clip:text;-webkit-text-fill-color:transparent}.sb{display:flex;align-items:center;gap:12px;padding:12px 20px;background:var(--s);border-bottom:1px solid var(--b)}.grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(300px,1fr));gap:12px;padding:16px}.c{background:var(--s);border:1px solid var(--b);border-radius:12px;padding:14px}.ct{font-size:10px;color:var(--m);text-transform:uppercase;letter-spacing:.1em;margin-bottom:10px}.fl{grid-column:1/-1}.sr{display:flex;justify-content:space-between;padding:6px 0;border-bottom:1px solid rgba(255,255,255,.04)}.sr:last-child{border:none}.sv{color:var(--a);font-weight:600}.le{display:flex;gap:8px;padding:5px 0;border-bottom:1px solid rgba(255,255,255,.04);font-size:11px;align-items:flex-start}.le:last-child{border:none}.lt{color:var(--m);white-space:nowrap;flex-shrink:0}.ll{white-space:nowrap;padding:1px 5px;border-radius:3px;font-size:10px;font-weight:600;flex-shrink:0}.lC{background:rgba(239,68,68,.2);color:var(--r)}.lW{background:rgba(245,158,11,.2);color:var(--y)}.lI{background:rgba(79,172,254,.2);color:var(--a)}.lm{flex:1;color:var(--t)}.kb{padding:8px 16px;background:rgba(239,68,68,.15);border:1px solid rgba(239,68,68,.3);border-radius:8px;color:var(--r);cursor:pointer;font-family:var(--f);font-size:13px;font-weight:700}.live{display:flex;align-items:center;gap:6px;padding:4px 10px;background:rgba(34,197,94,.1);border:1px solid rgba(34,197,94,.3);border-radius:20px;font-size:11px;color:var(--g)}.ld{width:6px;height:6px;border-radius:50%;background:var(--g);animation:p 1.5s infinite}@keyframes p{0%,100%{opacity:1}50%{opacity:.3}}</style></head><body>
<div class="hdr"><h1>🛡️ Sovereignty</h1><div style="display:flex;align-items:center;gap:12px"><div class="live"><div class="ld"></div>LIVE 5s</div><a href="/" style="color:var(--m);text-decoration:none;font-size:12px">← Chat</a></div></div>
<div class="sb" id="sb">Chargement...</div>
<div class="grid" id="ct"></div>
<script>
const T=localStorage.getItem('relay_token')||document.cookie.split(';').find(c=>c.trim().startsWith('relay_token='))?.split('=')[1]||'';
async function load(){try{const r=await fetch('/sovereignty/realtime',{headers:{'Authorization':'Bearer '+T}});render(await r.json());}catch(e){document.getElementById('sb').innerHTML='<span style="color:var(--r)">❌ '+e.message+'</span>';}}
function render(d){const s=d.stats||{},a=d.status==='ACTIVE';
document.getElementById('sb').innerHTML='<div style="color:'+(a?'var(--g)':'var(--r)')+';font-size:16px;font-weight:700">'+(a?'🟢 ACTIF':'🔴 KILL SWITCH')+'</div><div style="color:var(--m);font-size:11px">'+d.rules+' règles · Intégrité: <span style="color:'+(d.integrity?'var(--g)':'var(--r))+'">'+(d.integrity?'✓ INTACT':'⚠ MODIFIÉ')+'</span></div><div style="color:var(--m);font-size:10px;margin-left:auto">'+new Date(d.ts).toLocaleTimeString('fr-FR')+'</div>';
const logs=(s.recentActivity||[]).slice(0,25);
document.getElementById('ct').innerHTML='<div class="c"><div class="ct">📊 Stats</div><div class="sr"><span>Audit entries</span><span class="sv">'+(s.totalAuditEntries||0)+'</span></div><div class="sr"><span>Bloquées</span><span class="sv" style="color:var(--r)">'+(s.blockedCommands||0)+'</span></div><div class="sr"><span>Warnings</span><span class="sv" style="color:var(--y)">'+(s.warnings||0)+'</span></div><div class="sr"><span>Règles</span><span class="sv" style="color:var(--g)">'+(d.rules||32)+'</span></div><div class="sr"><span>Intégrité</span><span class="sv" style="color:'+(d.integrity?'var(--g)':'var(--r)')+'">'+(d.integrity?'✓ OK':'⚠ FAIL')+'</span></div></div><div class="c"><div class="ct">🔴 Kill Switch</div><div style="margin-bottom:10px;color:var(--m);font-size:11px">Arrêt d\'urgence</div><button class="kb" onclick="kill()">🔴 KILL</button></div>'+(d.changes?.length?'<div class="c"><div class="ct" style="color:var(--r)">⚠ Changements</div>'+d.changes.map(c=>'<div class="sr"><span style="color:var(--y)">'+(c.file||c)+'</span><span style="color:var(--r)">MODIFIÉ</span></div>').join('')+'</div>':'')+'<div class="c fl"><div class="ct">📋 Activité</div>'+logs.map(e=>{const ts=new Date(e.ts||Date.now()).toLocaleTimeString('fr-FR');const lv=e.level||e.type||'INFO';const msg=e.message||e.raw||JSON.stringify(e).slice(0,80);return'<div class="le"><span class="lt">'+ts+'</span><span class="ll l'+lv[0]+'">'+lv+'</span><span class="lm">'+msg.slice(0,120)+'</span></div>';}).join('')||'<div style="color:var(--m)">Aucune activité</div>'+'</div>';}
async function kill(){if(!confirm('⚠️ ARRÊTER PROMETHEUS ?'))return;try{await fetch('/sovereignty/kill',{method:'POST',headers:{'Authorization':'Bearer '+T}});load();}catch(e){alert('❌ '+e.message);}}
load();setInterval(load,5000);
</script></body></html>
