<!DOCTYPE html><html lang="fr"><head><meta charset="UTF-8"><meta name="viewport" content="width=device-width,initial-scale=1"><title>PROMETHEUS Analytics</title>
<style>:root{--bg:#070b14;--s:#0d1424;--b:rgba(79,172,254,.12);--a:#4facfe;--g:#22c55e;--r:#ef4444;--y:#f59e0b;--t:#eef2ff;--m:rgba(238,242,255,.4);--f:'JetBrains Mono',monospace}*{margin:0;padding:0;box-sizing:border-box}body{background:var(--bg);color:var(--t);font-family:var(--f);font-size:13px}.hdr{padding:14px 20px;border-bottom:1px solid var(--b);display:flex;align-items:center;justify-content:space-between;background:var(--s)}.hdr h1{font-size:15px;font-weight:700;background:linear-gradient(135deg,#fff,var(--a));-webkit-background-clip:text;-webkit-text-fill-color:transparent}.grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(280px,1fr));gap:14px;padding:16px}.c{background:var(--s);border:1px solid var(--b);border-radius:12px;padding:14px}.ct{font-size:10px;color:var(--m);text-transform:uppercase;letter-spacing:.1em;margin-bottom:10px}.bn{font-size:36px;font-weight:700;color:var(--a)}.bl{font-size:11px;color:var(--m);margin-top:4px}.sr{display:flex;justify-content:space-between;padding:6px 0;border-bottom:1px solid var(--b)}.sr:last-child{border:none}.sv{color:var(--a);font-weight:600}.bw{margin:6px 0}.blb{display:flex;justify-content:space-between;font-size:11px;margin-bottom:3px}.bbg{background:rgba(255,255,255,.05);border-radius:4px;height:6px;overflow:hidden}.bf{height:100%;border-radius:4px;background:linear-gradient(90deg,var(--a),#a78bfa);transition:width .5s}.fl{grid-column:1/-1}.mp{display:inline-flex;align-items:center;gap:4px;padding:3px 8px;border-radius:16px;font-size:11px;margin:2px;background:rgba(79,172,254,.08);border:1px solid rgba(79,172,254,.15)}.ld{text-align:center;padding:40px;color:var(--m)}</style></head><body>
<div class="hdr"><h1>⚡ Analytics</h1><div style="display:flex;gap:8px;align-items:center"><span style="font-size:10px;color:var(--m)" id="lu">--</span><button onclick="load()" style="padding:5px 12px;background:rgba(79,172,254,.1);border:1px solid var(--b);border-radius:8px;color:var(--a);cursor:pointer;font-family:var(--f);font-size:11px">↻</button><a href="/" style="color:var(--m);text-decoration:none;font-size:12px">← Chat</a></div></div>
<div id="content"><div class="ld">⏳ Chargement...</div></div>
<script>
const T=localStorage.getItem('relay_token')||document.cookie.split(';').find(c=>c.trim().startsWith('relay_token='))?.split('=')[1]||'';
async function load(){try{const r=await fetch('/analytics/full',{headers:{'Authorization':'Bearer '+T}});const d=await r.json();if(d.error){document.getElementById('content').innerHTML='<div class="ld">❌ '+d.error+'</div>';return;}render(d);document.getElementById('lu').textContent=new Date().toLocaleTimeString('fr-FR');}catch(e){document.getElementById('content').innerHTML='<div class="ld">❌ '+e.message+'</div>';}}
function render(d){const q=d.quality||{},mem=d.memory||{},ai=d.ai||{},tok=d.tokens||{},sys=d.system||{};
const total=Object.values(q.byModel||{}).reduce((s,v)=>s+v,0)||1;
const models=[{l:'Llama',k:'llama',c:'#22c55e'},{l:'Sonnet',k:'claude',c:'#4facfe'},{l:'Opus',k:'claude-deep',c:'#a78bfa'},{l:'Cache',k:'cache',c:'#f59e0b'}].map(m=>({...m,n:q.byModel?.[m.k]||0,p:Math.round(((q.byModel?.[m.k]||0)/total)*100)}));
const types=Object.entries(q.byType||{}).sort((a,b)=>b[1]-a[1]).slice(0,8);
document.getElementById('content').innerHTML='<div class="grid">'+
'<div class="c"><div class="ct">💬 Messages</div><div class="bn">'+(d.conversations?.totalMessages||0)+'</div><div class="bl">total échangés</div></div>'+
'<div class="c"><div class="ct">📊 Qualité</div><div class="bn">'+(q.avg||0)+'%</div><div class="bl">moyenne sur '+q.total+' réponses</div>'+Object.entries(q.issues||{}).slice(0,3).map(([i,c])=>'<div class="sr"><span style="color:var(--y)">⚠ '+i+'</span><span class="sv">'+c+'x</span></div>').join('')+'</div>'+
'<div class="c"><div class="ct">💰 Économies</div><div class="bn">'+(tok.saved||0).toLocaleString()+'</div><div class="bl">tokens économisés</div><div class="sr"><span>Llama</span><span class="sv">'+(tok.llamaCalls||0)+'</span></div><div class="sr"><span>Cache</span><span class="sv">'+(tok.cacheCalls||0)+'</span></div><div class="sr"><span>Claude</span><span class="sv">'+(tok.claudeCalls||0)+'</span></div></div>'+
'<div class="c"><div class="ct">🔀 Routing</div>'+models.map(m=>'<div class="bw"><div class="blb"><span><span style="display:inline-block;width:8px;height:8px;border-radius:50%;background:'+m.c+';margin-right:6px"></span>'+m.l+'</span><span>'+m.n+' ('+m.p+'%)</span></div><div class="bbg"><div class="bf" style="width:'+m.p+'%"></div></div></div>').join('')+'</div>'+
'<div class="c"><div class="ct">🧠 Mémoire</div><div class="sr"><span>Faits LTM</span><span class="sv">'+(mem.ltmFacts||0)+'</span></div><div class="sr"><span>KG nodes</span><span class="sv">'+(mem.kgNodes||0)+'</span></div><div class="sr"><span>Profil cognitif</span><span class="sv">'+(mem.cogMessages||0)+' msgs</span></div></div>'+
'<div class="c"><div class="ct">⚡ IA Autonome</div><div class="sr"><span>Pensées</span><span class="sv">'+(ai.thoughts||0)+'</span></div><div class="sr"><span>RL épisodes</span><span class="sv">'+(ai.rlEpisodes||0)+'</span></div><div class="sr"><span>Réflexions</span><span class="sv">'+(ai.reflections||0)+'</span></div><div class="sr"><span>Positions</span><span class="sv">'+(ai.positions||0)+'</span></div></div>'+
'<div class="c fl"><div class="ct">📋 Types</div><div style="display:flex;flex-wrap:wrap;gap:6px">'+types.map(([t,c])=>'<span class="mp">'+t+' <b style="color:var(--a)">'+c+'</b></span>').join('')+'</div></div></div>';}
load();setInterval(load,30000);
</script></body></html>
