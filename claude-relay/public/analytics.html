<!DOCTYPE html><html lang="fr"><head><link rel="apple-touch-icon" href="icon-512.png"><link rel="apple-touch-icon" sizes="192x192" href="icon-192.png"><link rel="apple-touch-icon" sizes="512x512" href="icon-512.png"><link rel="icon" type="image/svg+xml" href="prometheus-logo.svg"><link rel="icon" type="image/png" sizes="512x512" href="icon-512.png"><meta charset="UTF-8"/><meta name="viewport" content="width=device-width,initial-scale=1"/><title>PROMETHEUS — Analytics</title>
<script src="https://cdnjs.cloudflare.com/ajax/libs/Chart.js/4.4.0/chart.umd.min.js"></script>
<style>*{box-sizing:border-box;margin:0;padding:0}body{background:#030308;color:#eef2ff;font-family:Inter,sans-serif;min-height:100vh}.top{height:56px;background:rgba(3,3,8,0.95);border-bottom:1px solid rgba(79,172,254,0.1);display:flex;align-items:center;justify-content:space-between;padding:0 24px;position:sticky;top:0;z-index:10}.logo{font-weight:700;font-size:16px;background:linear-gradient(90deg,#fff,#4facfe);-webkit-background-clip:text;-webkit-text-fill-color:transparent}.ct{padding:24px;max-width:1400px;margin:0 auto}.sg{display:grid;grid-template-columns:repeat(auto-fit,minmax(160px,1fr));gap:12px;margin-bottom:20px}.st{background:rgba(8,10,28,0.9);border:1px solid rgba(79,172,254,0.12);border-radius:16px;padding:16px}.si{font-size:22px;margin-bottom:6px}.sv{font-weight:700;font-size:24px;background:linear-gradient(135deg,#4facfe,#00f2fe);-webkit-background-clip:text;-webkit-text-fill-color:transparent}.sl{font-size:10px;color:rgba(238,242,255,0.4);text-transform:uppercase;letter-spacing:0.08em}.cg{display:grid;grid-template-columns:1fr 1fr;gap:14px;margin-bottom:16px}.cc{background:rgba(8,10,28,0.9);border:1px solid rgba(79,172,254,0.12);border-radius:16px;padding:18px}.cc.f{grid-column:1/-1}.ct2{font-size:12px;font-weight:600;color:rgba(238,242,255,0.6);margin-bottom:14px;display:flex;justify-content:space-between;align-items:center}canvas{max-height:200px}.pb{padding:4px 10px;border-radius:6px;border:1px solid rgba(79,172,254,0.2);background:none;color:rgba(238,242,255,0.4);font-size:10px;cursor:pointer;margin-left:4px}.pb.on{background:rgba(79,172,254,0.1);border-color:#4facfe;color:#4facfe}.bd{padding:5px 12px;border-radius:20px;font-size:10px;background:rgba(79,172,254,0.07);border:1px solid rgba(79,172,254,0.15);color:#4facfe;margin:3px;display:inline-block}.sm{margin-bottom:18px}@media(max-width:680px){.cg{grid-template-columns:1fr}.cc.f{grid-column:1}}</style></head><body>
<div class="top"><div class="logo">⚡ Analytics</div><div style="display:flex;gap:8px;align-items:center"><span id="upd" style="font-size:10px;color:rgba(238,242,255,0.25);font-family:monospace"></span><button onclick="load()" style="padding:5px 12px;border-radius:8px;border:1px solid rgba(79,172,254,0.2);background:rgba(79,172,254,0.07);color:#4facfe;font-size:11px;cursor:pointer">↻</button><a href="/" style="padding:5px 12px;border-radius:8px;border:1px solid rgba(79,172,254,0.2);background:rgba(79,172,254,0.07);color:#4facfe;font-size:11px;text-decoration:none">←</a></div></div>
<div class="ct"><div class="sm" id="sm"></div><div class="sg" id="sg"></div>
<div class="cg">
<div class="cc f"><div class="ct2"><span>Activité 30j</span><div><button class="pb on" onclick="sw('tokens',this)">Tokens</button><button class="pb" onclick="sw('chats',this)">Chats</button><button class="pb" onclick="sw('webFetches',this)">Web</button></div></div><canvas id="c1"></canvas></div>
<div class="cc"><div class="ct2">Heure par heure</div><canvas id="c2"></canvas></div>
<div class="cc"><div class="ct2">Répartition</div><canvas id="c3"></canvas></div>
<div class="cc f"><div class="ct2">Coût cumulé (USD)</div><canvas id="c4"></canvas></div>
</div></div>
<script>
let D,cT,cH,cB,cC,M='tokens';const O={responsive:true,maintainAspectRatio:true,plugins:{legend:{display:false}},scales:{x:{grid:{color:'rgba(79,172,254,0.05)'},ticks:{color:'rgba(238,242,255,0.25)',font:{size:9},maxTicksLimit:12}},y:{grid:{color:'rgba(79,172,254,0.05)'},ticks:{color:'rgba(238,242,255,0.25)',font:{size:9}}}}};
function f(n){if(!n&&n!==0)return'0';if(n>=1e6)return(n/1e6).toFixed(1)+'M';if(n>=1e3)return(n/1e3).toFixed(1)+'k';return''+Math.round(n);}
async function load(){try{D=await fetch('/analytics/data').then(r=>r.json());render();document.getElementById('upd').textContent=new Date().toLocaleTimeString('fr-FR');}catch(e){}}
function render(){if(!D)return;const t=D.total||{},d=D.today||{},w=D.thisWeek||{};
document.getElementById('sm').innerHTML=['🪙 '+f(t.tokens)+' tokens','💬 '+f(t.chats)+' chats','🧠 '+f(t.decisions)+' décisions','💰 $'+(D.costs?.totalUSD||0),'📂 '+f(t.sessions)+' sessions','🌐 '+f(t.webFetches)+' web'].map(b=>'<span class="bd">'+b+'</span>').join('');
document.getElementById('sg').innerHTML=[{i:'🪙',v:f(d.tokens||0),l:"Tokens auj."},{i:'💬',v:f(d.chats||0),l:"Chats auj."},{i:'📅',v:f(w.tokens||0),l:'Sem.'},{i:'⚡',v:(d.avgResponseMs||0)+'ms',l:'Vitesse'},{i:'🌐',v:f(d.webFetches||0),l:'Web'},{i:'💰',v:'$'+(D.costs?.totalUSD||0),l:'Coût'}].map(s=>'<div class="st"><div class="si">'+s.i+'</div><div class="sv">'+s.v+'</div><div class="sl">'+s.l+'</div></div>').join('');
d1();d2();d3();d4();}
function sw(m,el){M=m;document.querySelectorAll('.pb').forEach(b=>b.classList.remove('on'));el.classList.add('on');d1();}
function d1(){const ds=D?.days30||[];if(cT)cT.destroy();cT=new Chart(document.getElementById('c1'),{type:'bar',data:{labels:ds.map(d=>d.label),datasets:[{data:ds.map(d=>d[M]||0),backgroundColor:ds.map((_,i)=>i===ds.length-1?'rgba(79,172,254,0.8)':'rgba(79,172,254,0.2)'),borderRadius:4}]},options:O});}
function d2(){const h=D?.hourly||Array(24).fill(0);if(cH)cH.destroy();cH=new Chart(document.getElementById('c2'),{type:'line',data:{labels:Array.from({length:24},(_,i)=>i+'h'),datasets:[{data:h,fill:true,backgroundColor:'rgba(167,139,250,0.1)',borderColor:'rgba(167,139,250,0.6)',borderWidth:2,pointRadius:2,tension:0.4}]},options:O});}
function d3(){const t=D?.total||{};if(cB)cB.destroy();cB=new Chart(document.getElementById('c3'),{type:'doughnut',data:{labels:['Chats','Web','Screenshots','Commandes'],datasets:[{data:[t.chats||0,t.webFetches||0,t.screenshots||0,t.commands||0],backgroundColor:['rgba(79,172,254,0.7)','rgba(16,185,129,0.7)','rgba(245,158,11,0.7)','rgba(167,139,250,0.7)'],borderWidth:1,borderColor:'rgba(3,3,8,0.5)'}]},options:{responsive:true,maintainAspectRatio:true,cutout:'65%',plugins:{legend:{position:'right',labels:{color:'rgba(238,242,255,0.5)',font:{size:10}}}}}});}
function d4(){const ds=D?.days30||[];let c=0;if(cC)cC.destroy();cC=new Chart(document.getElementById('c4'),{type:'line',data:{labels:ds.map(d=>d.label),datasets:[{data:ds.map(d=>{c+=(d.tokens||0)*0.000003;return+c.toFixed(5);}),fill:true,backgroundColor:'rgba(16,185,129,0.08)',borderColor:'rgba(16,185,129,0.5)',borderWidth:2,pointRadius:2,tension:0.4}]},options:O});}
load();setInterval(load,30000);
</script></body></html>
